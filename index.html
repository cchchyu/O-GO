      -webkit-touch-callout: none;

    #root{display:flex;flex-direction:column;height:100dvh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideLeft{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
    @keyframes slideRight{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
    @keyframes pop{0%{transform:scale(1)}50%{transform:scale(0.94)}100%{transform:scale(1)}}
    .fade-in{animation:fadeIn 0.22s ease both}
    .slide-left{animation:slideLeft 0.22s ease both}
    .slide-right{animation:slideRight 0.22s ease both}

    select{-webkit-appearance:auto;}
    input,textarea,select{font-size:16px !important;}
  </style>

  <!-- 🛠️ 暴力破解：全域手機觸控轉滑鼠事件腳本 -->
  <script>
    (function() {
      let touchTimeout;
      let isDragging = false;

      function touchHandler(event) {
        const touches = event.changedTouches, first = touches[0];
        let type = "";

        switch(event.type) {
          case "touchstart": 
            // 模擬滑鼠移入，並準備長按觸發
            type = "mouseover"; 
            clearTimeout(touchTimeout);
            touchTimeout = setTimeout(() => {
              isDragging = true;
              dispatch(event, "mousedown", first);
              dispatch(event, "dragstart", first);
            }, 250); // 長按 250 毫秒後強制啟動拖曳
            break;
          case "touchmove": 
            if (!isDragging) {
              clearTimeout(touchTimeout);
              return; // 如果不是在拖曳，允許正常的網頁滾動
            }
            event.preventDefault(); // 阻止網頁滾動
            type = "mousemove"; 
            
            // 強制幫 HTML5 找到目前手指下方的元素（ because touchmove target won't change ）
            let element = document.elementFromPoint(first.clientX, first.clientY);
            if (element) {
              let dragEnterEvent = document.createEvent("MouseEvent");
              dragEnterEvent.initMouseEvent("dragenter", true, true, window, 1, first.screenX, first.screenY, first.clientX, first.clientY, false, false, false, false, 0, null);
              element.dispatchEvent(dragEnterEvent);
            }
            break;
          case "touchend": 
            clearTimeout(touchTimeout);
            if (!isDragging) return;
            isDragging = false;
            type = "mouseup"; 
            dispatch(event, "dragend", first);
            break;
          default: return;
        }

        if (type) dispatch(event, type, first);
      }

      function dispatch(event, type, touch) {
        const simulatedEvent = document.createEvent("MouseEvent");
        simulatedEvent.initMouseEvent(type, true, true, window, 1, touch.screenX, touch.screenY, touch.clientX, touch.clientY, false, false, false, false, 0, null);
        event.target.dispatchEvent(simulatedEvent);
      }

      document.addEventListener("touchstart", touchHandler, { passive: false });
      document.addEventListener("touchmove", touchHandler, { passive: false });
      document.addEventListener("touchend", touchHandler, { passive: false });
    })();
  </script>

          <button onClick={() => setSub(null)} style={{ width:"100%", background:"#f2f2f7", border:"none", borderRadius:12, padding:14, ...tx(T.body), color:"#555", cursor:"pointer" }}>取消</button>
          {copied && <div style={{ position:"absolute", top:"30%", left:"50%", transform:"translate(-50%,-50%)", background:"rgba(0,0,0,0.75)", color:C.bg, padding:"12px 24px", borderRadius:20, ...tx(T.label) }}>連結已複製！</div>}

    <div style={{ display:"flex", flexDirection:"column", height:"100%", position:"relative" }}>
      <div style={{ height:160, background:trip.cover||COVER_GRADIENTS[0], flexShrink:0 }}>
        <GlassBar onBack={onBack} rightSlot={
          <div style={{ background:"rgba(255,255,255,0.65)", backdropFilter:"blur(8px)", borderRadius:296, height:44, display:"flex", alignItems:"center", padding:"0 8px", gap:16 }}>
            <button onClick={() => { const s=spots[curDayIdx!==null?curDayIdx:0]||[]; if(!s.length){showToast("本日尚未加入景點");return;} window.open("https://www.google.com/maps/dir/"+s.map(x=>encodeURIComponent(x.name)).join("/"),"_blank"); }} style={{ background:"none", border:"none", cursor:"pointer", width:36, height:36, display:"flex", alignItems:"center", justifyContent:"center" }}>
              <IcMap color={C.text} size={22}/>
            </button>
            <button onClick={() => setSub("share")} style={{ background:"none", border:"none", cursor:"pointer", width:36, height:36, display:"flex", alignItems:"center", justifyContent:"center" }}>
              <IcShare color={C.text} size={22}/>
            </button>
          </div>
        }/>
      </div>
      <div style={{ background:C.bg, boxShadow:"0 2px 6px rgba(0,0,0,0.05)", flexShrink:0 }}>
        <div style={{ padding:"16px 24px 0" }}>
          <div style={{ fontFamily:FF, fontSize:24, fontWeight:700, color:C.text, lineHeight:1.3 }}>{trip.name}</div>
          <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:6, marginBottom:10 }}>
            <IcCalendar color={C.accent} size={16}/>
            <span style={{ fontFamily:FF, fontSize:15, fontWeight:600, color:C.accent }}>{trip.startDate} ~ {trip.endDate}</span>
          </div>
        </div>
        <div style={{ display:"flex", borderTop:"0.5px solid "+C.line, alignItems:"stretch" }}>
          <button onClick={() => changeDay(0)} style={{ flexShrink:0, background:"none", border:"none", cursor:"pointer", padding:"0 16px", display:"flex", alignItems:"center", borderBottom:activeDay===0?"3px solid "+C.accent:"3px solid transparent", height:52 }}>
            <span style={{ fontFamily:FF, fontSize:15, fontWeight:activeDay===0?600:400, color:activeDay===0?C.accent:C.textHint }}>行程概覽</span>

            {days.map((d,i) => {

              return (
                <button key={i} onClick={() => changeDay(i+1)} style={{ flexShrink:0, background:"none", border:"none", cursor:"pointer", padding:"0 12px", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", borderBottom:on?"3px solid "+C.accent:"3px solid transparent", minWidth:64, height:52, gap:2 }}>
                  <span style={{ fontFamily:FF, fontSize:12, fontWeight:500, color:on?C.accent:C.textHint }}>{d.short}</span>

      </div>

        {activeDay===0

          : <div key={"d"+activeDay} className={dirClass}>
              <DayTab spots={spots[curDayIdx]||[]} dragging={dragging} over={over} setDragging={setDragging} setOver={setOver} onMove={moveSpot} onDots={i=>setActionSheet(i)} onViewSpot={i=>{setTarget([curDayIdx,i]);setSub("viewSpot");}}/>
            </div>
        }
      </div>
      {activeDay!==0 && (
        <div style={{ padding:"12px 16px 16px", borderTop:"0.5px solid "+C.line, flexShrink:0, background:C.bg }}>
          <OrangeBtn label="搜尋並新增景點" onClick={() => setSub("addSpot")}/>
        </div>
      )}
      {sub==="share" && <ShareOverlay/>}
      {actionSheet!==null && (
        <>
          <div onClick={() => setActionSheet(null)} style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.4)", zIndex:10 }}/>
          <div style={{ position:"absolute", bottom:0, left:0, right:0, zIndex:11, background:C.bg, borderRadius:"16px 16px 0 0", padding:"16px 24px 32px" }}>
            <div style={{ width:40, height:4, background:"#e0e0e0", borderRadius:2, margin:"0 auto 16px" }}/>
            <div style={{ ...tx(T.label), color:C.textHint, marginBottom:12, textAlign:"center" }}>{(spots[curDayIdx]||[])[actionSheet]?.name}</div>
            <button onClick={() => { setTarget(actionSheet); setSub("editNote"); setActionSheet(null); }} style={{ width:"100%", background:"#f2f2f7", border:"none", borderRadius:12, padding:"14px", ...tx(T.body), color:C.text, cursor:"pointer", marginBottom:8, textAlign:"left" }}>新增備註</button>
            <button onClick={() => { deleteSpot(actionSheet); setActionSheet(null); }} style={{ width:"100%", background:"#fff0ed", border:"none", borderRadius:12, padding:"14px", ...tx(T.body), color:C.accent, cursor:"pointer", textAlign:"left" }}>刪除景點</button>

function OverviewTab({ days, spots }) {
  return (
    <div style={{ padding:"16px 24px" }}>
      {days.map((d,i) => (
        <div key={i} style={{ marginBottom:24 }}>
          <div style={{ ...tx(T.label), color:C.accent, marginBottom:8 }}>Day{i+1} · {d.label}</div>
          {(spots[i]||[]).length===0
            ? <div style={{ ...tx(T.capSub), color:C.textHint }}>尚未加入景點</div>
            : (spots[i]||[]).map((s,j) => (
              <div key={j} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 0", borderBottom:"0.5px solid "+C.line }}>
                <span style={{ fontFamily:FF, fontSize:16, fontWeight:500, color:C.accent, minWidth:20 }}>{j+1}</span>
                <span style={{ ...tx(T.body), color:C.text, flex:1 }}>{s.name}</span>

function DayTab({ spots, dragging, over, setDragging, setOver, onMove, onDots, onViewSpot }) {
  const end = () => { if(dragging!==null&&over!==null&&dragging!==over) onMove(dragging,over); setDragging(null); setOver(null); };
  if (!spots.length) return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"60px 32px", gap:16 }}>
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none"><path d="M21 10C21 17 12 23 12 23S3 17 3 10C3 7.61 3.95 5.32 5.64 3.64C7.32 1.95 9.61 1 12 1C14.39 1 16.68 1.95 18.36 3.64C20.05 5.32 21 7.61 21 10Z" stroke={C.textHint} strokeWidth="0.8" strokeLinecap="round" strokeLinejoin="round"/><path d="M12 13C13.66 13 15 11.66 15 10C15 8.34 13.66 7 12 7C10.34 7 9 8.34 9 10C9 11.66 10.34 13 12 13Z" stroke={C.textHint} strokeWidth="0.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
      <p style={{ fontFamily:FF, fontSize:14, color:C.textHint, textAlign:"center", lineHeight:1.8, margin:0 }}>這天想去哪些景點呢？<br/>點下方按鈕搜尋景點</p>
    </div>
  );
  return (
    <div style={{ position:"relative", padding:"8px 0 0 24px" }}>
      <div style={{ position:"absolute", left:28, top:20, bottom:20, width:1, background:C.accent+"40" }}/>
      {spots.map((s,i) => (
        <div key={i} draggable onDragStart={()=>setDragging(i)} onDragEnter={()=>setOver(i)} onDragEnd={end} onDragOver={e=>e.preventDefault()}
          style={{ display:"flex", alignItems:"center", height:64, opacity:dragging===i?0.4:1, background:over===i&&dragging!==i?"#fff5f1":"transparent" }}>
          <div style={{ width:11, height:11, borderRadius:"50%", background:C.accent, flexShrink:0, zIndex:1, boxShadow:"0 0 0 3px rgba(253,110,68,0.15)" }}/>
          <div style={{ flex:1, display:"flex", alignItems:"center", borderBottom:"0.333px solid "+C.line, height:"100%", marginLeft:12 }}>
            <div style={{ flex:1, cursor:"pointer" }} onClick={() => onViewSpot(i)}>
              <div style={{ ...tx(T.body), color:C.text }}>{s.name}</div>
              {s.note && <div style={{ fontFamily:FF, fontSize:14, color:C.textSub }}>{s.note}</div>}
            </div>
            <button onClick={() => onDots(i)} style={{ background:"none", border:"none", cursor:"pointer", padding:0, display:"flex", alignItems:"center", height:"100%" }}><IcDots/></button>
            <div style={{ cursor:"grab" }}><IcGrabber/></div>
          </div>
        </div>
      ))}
    </div>
  );
}

function AddSpotScreen({ dayLabel, onAdd, onBack }) {
  const [query, setQuery] = useState("");
  const [country, setCountry] = useState("japan");
  const [selected, setSelected] = useState([]);
  const [viewSpot, setViewSpot] = useState(null);
  const filtered = query.trim()
    ? ALL_SPOTS.filter(s => s.name.includes(query)||s.area.includes(query))
    : ALL_SPOTS.filter(s => !HIDE_DEFAULT.includes(s.name)).filter(s => SPOT_DB[country]?.includes(s));
  const toggle = name => setSelected(p => p.includes(name)?p.filter(x=>x!==name):[...p,name]);
  if (viewSpot) return <ViewpointScreen spot={viewSpot} onBack={() => setViewSpot(null)} onAddToTrip={() => { if(!selected.includes(viewSpot.name)) toggle(viewSpot.name); setViewSpot(null); }}/>;
  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%" }}>
      <NavBar title={dayLabel+" · 新增景點"} onBack={onBack}/>
      <div style={{ padding:"12px 16px 0" }}>
        <div style={{ background:"#f2f2f7", borderRadius:10, padding:"8px 14px", display:"flex", alignItems:"center", gap:8 }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.textHint} strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="搜尋景點名稱..." style={{ border:"none", background:"transparent", flex:1, ...tx(T.body), outline:"none" }}/>
        </div>
      </div>
      <div style={{ display:"flex", gap:8, padding:"10px 16px 4px", overflowX:"auto" }}>
        {COUNTRY_TABS.map(t => (
          <button key={t.id} onClick={() => { setCountry(t.id); setQuery(""); }} style={{ flexShrink:0, background:country===t.id&&!query?C.accent:"#f2f2f7", color:country===t.id&&!query?C.bg:C.text, border:"none", borderRadius:16, padding:"5px 14px", ...tx(T.caption), cursor:"pointer" }}>{t.label}</button>
        ))}
      </div>
      <div style={{ flex:1, overflowY:"auto" }}>
        {query.trim()&&filtered.length===0 && (
          <div style={{ textAlign:"center", padding:"40px 20px" }}>
            <div style={{ ...tx(T.body), color:C.textHint, marginBottom:8 }}>找不到相關景點</div>
            <div style={{ ...tx(T.capSub), color:C.textHint }}>你仍可以直接加入這個景點</div>
            <button className="btn-pop" onClick={() => onAdd([{name:query.trim(),note:"",area:"自訂景點",tags:[],rating:0}])}
              style={{ marginTop:16, background:C.accent, color:C.bg, border:"none", borderRadius:20, padding:"8px 24px", ...tx(T.label), cursor:"pointer" }}>
              加入「{query.trim()}」
            </button>
          </div>
        )}
        {filtered.map(s => {
          const isSel = selected.includes(s.name);
          return (
            <div key={s.name} style={{ display:"flex", alignItems:"center", padding:"0 16px", height:64, borderBottom:"0.5px solid "+C.line }}>
              <div style={{ flex:1, cursor:"pointer", height:"100%", display:"flex", alignItems:"center" }} onClick={() => setViewSpot(s)}>
                <div>
                  <div style={{ fontFamily:FF, fontSize:16, fontWeight:500, color:C.text }}>{s.name}</div>
                  <div style={{ ...tx(T.capSub), color:C.textHint }}>{s.area}</div>
                </div>
              </div>
              <StarRow count={s.rating}/>
              <button onClick={() => toggle(s.name)} style={{ marginLeft:12, width:32, height:32, borderRadius:"50%", background:isSel?C.accent:"transparent", border:"2px solid "+(isSel?C.accent:"#ccc"), display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, cursor:"pointer" }}>
                {isSel ? <svg width="14" height="11" viewBox="0 0 14 11" fill="none"><path d="M1 5.5L5 9.5L13 1.5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                       : <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="#ccc" strokeWidth="2" strokeLinecap="round"/></svg>}
              </button>
            </div>
          );
        })}
        <div style={{ height:100 }}/>
      </div>
      {selected.length>0 && (
        <div style={{ padding:"12px 16px 16px", borderTop:"0.5px solid "+C.line, background:C.bg, flexShrink:0 }}>
          <OrangeBtn label={"加入 "+selected.length+" 個景點"} onClick={() => { const list=selected.map(n=>ALL_SPOTS.find(s=>s.name===n)||{name:n,note:"",area:"自訂景點",tags:[],rating:0}); onAdd(list); }}/>
        </div>
      )}
    </div>
  );
}

function buildDays(start, end) {
  const days=[], cur=new Date(start), last=new Date(end);
  while(cur<=last){
    const mo=cur.getMonth()+1, d=cur.getDate();
    const wd=["日","一","二","三","四","五","六"][cur.getDay()];
    days.push({ label:mo+"/"+d+" 週"+wd, short:String(mo).padStart(2,"0")+"/"+String(d).padStart(2,"0") });
    cur.setDate(cur.getDate()+1);
  }
  return days;
}

function App() {
  const [tab, setTab] = useState("create");
  const [trips, setTrips] = useState([]);
  const [openIdx, setOpenIdx] = useState(null);
  const [spotsMap, setSpotsMap] = useState({});
  const handleCreated = trip => { const idx=trips.length; setTrips(p=>[...p,trip]); setOpenIdx(idx); setTab("trips"); };
  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background:C.bg, fontFamily:FF, overflow:"hidden" }}>
      {openIdx!==null&&trips[openIdx] ? (
        <TripScreen trip={trips[openIdx]} spotsMap={spotsMap} setSpotsMap={setSpotsMap} onBack={() => setOpenIdx(null)}/>
      ) : (
        <>
          <NavBar title={tab==="home"?"探索":tab==="trips"?"我的行程":tab==="create"?"建立行程":"個人中心"}/>
          <div style={{ flex:1, overflowY:"auto", display:"flex", flexDirection:"column" }}>
            {tab==="home"    && <HomeScreen/>}
            {tab==="trips"   && <TripsScreen trips={trips} onOpen={i=>setOpenIdx(i)}/>}
            {tab==="create"  && <CreateScreen onCreated={handleCreated}/>}
            {tab==="profile" && <ProfileScreen/>}
          </div>
          <TabBar active={tab} onChange={t=>{setTab(t);setOpenIdx(null);}}/>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
